<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Georgia',serif;
}

body{
    overflow:hidden;
    background:#050505;
    color:white;
}

.background{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at center,#3b0a0a 0%,#100505 40%,#000 100%);
}

.particle{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:.5;
    animation:float 12s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{opacity:.8;}
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

/* PAGE 1 */

#page1{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1.5s;
}

.title{
    font-size:2.5rem;
    margin-bottom:40px;
    letter-spacing:4px;
    text-shadow:0 0 20px rgba(255,255,255,.5);
}

.envelope{
    width:320px;
    height:220px;
    position:relative;
    cursor:pointer;
    transition:1s;
}

.envelope:hover{
    transform:scale(1.05);
}

.base{
    width:100%;
    height:100%;
    background:#d8c2a5;
    position:absolute;
    border-radius:5px;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#c8b08d;
    clip-path:polygon(0 0,100% 0,50% 60%);
    transform-origin:top;
    transition:1.2s;
}

.open .flap{
    transform:rotateX(180deg);
}

.button{
    margin-top:40px;
    padding:14px 40px;
    border:none;
    border-radius:50px;
    background:white;
    color:black;
    font-size:1rem;
    cursor:pointer;
    transition:.4s;
}

.button:hover{
    transform:scale(1.08);
}

/* PAGE 2 */

#page2{
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.letter{
    width:90%;
    max-width:800px;
    background:#f8f1df;
    color:#222;
    padding:50px;
    border-radius:12px;
    box-shadow:
    0 0 60px rgba(255,220,150,.35),
    0 0 120px rgba(255,180,100,.2);
    position:relative;
    overflow-y:auto;
    max-height:90vh;
}

.letter::before{
    content:"";
    position:absolute;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
    width:160px;
    height:40px;
    background:rgba(255,220,120,.2);
    filter:blur(20px);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

#text{
    line-height:2;
    font-size:1.15rem;
    white-space:pre-wrap;
}

#finalLine{
    margin-top:40px;
    text-align:center;
    font-style:italic;
    font-size:1.3rem;
    opacity:0;
    color:#8b0000;
    transition:opacity 3s ease;
}

/* Candle glow */

.glow{
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(255,180,70,.18);
    border-radius:50%;
    filter:blur(70px);
    animation:flicker 3s infinite;
}

.left{
    left:-100px;
    bottom:-100px;
}

.right{
    right:-100px;
    top:-100px;
}

@keyframes flicker{
    0%,100%{opacity:.7;}
    50%{opacity:1;}
}

/* Rose petals */

.petal{
    position:absolute;
    font-size:20px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(120vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="background"></div>

<!-- PAGE 1 -->

<div id="page1">

    <div class="title">
        A LETTER FOR YOU ❤️
    </div>

    <div class="envelope" id="envelope">
        <div class="base"></div>
        <div class="flap"></div>
    </div>

    <button class="button" onclick="openLetter()">
        Open Letter
    </button>

</div>

<!-- PAGE 2 -->

<div id="page2">

    <div class="letter">

        <div class="glow left"></div>
        <div class="glow right"></div>

        <h1>HABIBI ❤️</h1>

        <div id="text"></div>

        <div id="finalLine">
            "And if I had to choose again,<br>
            I'd still choose you." ❤️
        </div>

    </div>

</div>

<script>

/* Particles */

for(let i=0;i<80;i++){
    let p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(8+Math.random()*10)+'s';
    p.style.animationDelay=Math.random()*10+'s';
    document.body.appendChild(p);
}

/* Roses */

for(let i=0;i<25;i++){
    let r=document.createElement('div');
    r.className='petal';
    r.innerHTML='🌹';
    r.style.left=Math.random()*100+'vw';
    r.style.animationDuration=(8+Math.random()*8)+'s';
    r.style.animationDelay=Math.random()*10+'s';
    document.body.appendChild(r);
}

/* Letter Text */

const letterText = `HABIBI:

i'm sorry for the moments when my worries spoke louder than my heart

for the times I wasn't as gentle, as patient or as present as you deserved

i know I overthink , I know I got lost in my own storms

but please never doubt this ;

you matter to me more than anything i've ever tried to put into words .

thank you for staying ,for trying,for understanding me even when I make it hard ,m working in my self every day not to be perfect ,but to be someone who loves you the way you always deserved.

because having you in my life isn't just special it's the part of my world I never want to take for granted .

nhbek bercha habib rouhi ❤️`;

function openLetter(){

    document.getElementById('envelope').classList.add('open');

    setTimeout(()=>{

        document.getElementById('page1').style.opacity='0';

        setTimeout(()=>{

            document.getElementById('page1').style.display='none';
            document.getElementById('page2').style.display='flex';

            typeWriter();

        },1000);

    },1200);
}

function typeWriter(){

    let i=0;
    const speed=35;
    const target=document.getElementById("text");

    function type(){

        if(i < letterText.length){

            target.innerHTML += letterText.charAt(i);
            i++;

            setTimeout(type,speed);

        }else{

            setTimeout(()=>{
                document.getElementById("finalLine").style.opacity="1";
            },3000);

        }
    }

    type();
}

</script>

</body>
</html>
