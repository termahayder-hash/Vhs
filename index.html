<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Memory Letter</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap');

body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Cairo', sans-serif;
    color:#f3e2c7;
    overflow:hidden;
}

/* VHS scanlines */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 3px,
        transparent 5px
    );
    opacity:0.25;
    pointer-events:none;
    z-index:10;
}

/* background layer */
.bg {
    position:fixed;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    filter:brightness(0.4) contrast(1.1) saturate(1.2);
    transition:1s ease;
    z-index:-1;
}

/* card */
.card {
    width:75%;
    max-width:800px;
    text-align:center;
    font-size:22px;
    line-height:2.2;
    padding:40px;
    background: rgba(20,20,20,0.55);
    border:1px solid rgba(255,200,150,0.2);
    backdrop-filter: blur(6px);
    box-shadow:0 0 40px rgba(255,150,100,0.1);
    transition:opacity 0.6s ease;
}

.hidden {
    opacity:0;
}

/* button */
button {
    margin-top:20px;
    padding:10px 18px;
    background:transparent;
    border:1px solid #f3e2c7;
    color:#f3e2c7;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="card" id="card"></div>

<script>

const pages = [
{
text:`من حبيبك و صديقك و اخوك و زوجك`,
bg:`https://images.unsplash.com/photo-1501785888041-af3ef285b470`
},
{
text:`أكتب إليك وقصف المدفعية يتناثر حولنا
ونحن مختبئون بكهوف الجبال

أفكر فيكِ كثيرًا..
أفكر فيك أكثر من الرصاص`,
bg:`https://images.unsplash.com/photo-1500530855697-b586d89ba3ee`
},
{
text:`لأني أُحبك خرجتُ إلى الشارع
لأن سماء الغرفة لم تكن كافية لتحليقي`,
bg:`https://images.unsplash.com/photo-1496307653780-42ee777d4833`
},
{
text:`إن البهجة التي يخلقها وجودك تجعلني أتحمل أي شيء`,
bg:`https://images.unsplash.com/photo-1518837695005-2083093ee35b`
},
{
text:`إني أُغلق عيني لأنظر في تلك الأعماق
فلا أجد نفسي إلا وقد أبحرت فيكِ`,
bg:`https://images.unsplash.com/photo-1507525428034-b723cf961d3e`
},
{
text:`وأنتِ يا ايلاف

لو أحبكِ مليون فأنا منهم
وإذا أحبكِ واحد فهذا أنا
وإذا لم يُحبك أحد فاعلمي حينها أني مت`,
bg:`https://images.unsplash.com/photo-1500534314209-a25ddb2bd429`
},
{
text:`أُحبكِ اليوم وغدًا وبعد غد
أُحبكِ كامل الأيام
أُحبكِ عندما نتخاصم وعند الأحضان

إلى آخر نبضة في قلبي
وإلى آخر نفس في صدري
ستبقين الحكاية الأجمل ♡`,
bg:`https://images.unsplash.com/photo-1500530855697-b586d89ba3ee`
}
];

let i = 0;

const card = document.getElementById("card");
const bg = document.getElementById("bg");

function show() {
    card.innerHTML = `
        <div style="white-space:pre-line">${pages[i].text}</div>
        <button onclick="next()">▶ next</button>
    `;

    bg.style.backgroundImage = `url('${pages[i].bg}')`;
}

function next() {
    card.classList.add("hidden");

    setTimeout(() => {
        i = (i + 1) % pages.length;
        show();
        card.classList.remove("hidden");
    }, 500);
}

show();

</script>

</body>
</html>
