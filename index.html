<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Memory Letter</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap');

body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at center, #0a0a0a, black);
    font-family:'Cairo', sans-serif;
    color:#f3e2c7;
    overflow:hidden;
}

/* VHS effect */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 3px,
        transparent 5px
    );
    opacity:0.3;
    pointer-events:none;
}

/* card */
.card {
    width:75%;
    max-width:800px;
    text-align:center;
    font-size:22px;
    line-height:2.2;
    padding:40px;
    border:1px solid rgba(255,200,150,0.2);
    background: rgba(20,20,20,0.6);
    backdrop-filter: blur(6px);
    box-shadow:0 0 40px rgba(255,150,100,0.1);
    transition: opacity 0.8s ease, transform 0.8s ease;
}

/* fade animation */
.hidden {
    opacity:0;
    transform:scale(0.95);
    pointer-events:none;
}

/* button */
button {
    margin-top:25px;
    padding:10px 20px;
    background:transparent;
    border:1px solid #f3e2c7;
    color:#f3e2c7;
    cursor:pointer;
    font-size:16px;
}

button:hover {
    background:rgba(255,200,150,0.1);
}
</style>
</head>

<body>

<div class="card" id="card"></div>

<script>

const pages = [

`من حبيبك و صديقك و اخوك و زوجك`,

`أكتب إليك وقصف المدفعية يتناثر حولنا
ونحن مختبئون بكهوف الجبال

أفكر فيكِ كثيرًا..
أفكر فيك أكثر من الرصاص`,

`لأني أُحبك خرجتُ إلى الشارع
لأن سماء الغرفة لم تكن كافية لتحليقي`,

`إن البهجة التي يخلقها وجودك تجعلني أتحمل أي شيء`,

`إني أُغلق عيني لأنظر في تلك الأعماق
فلا أجد نفسي إلا وقد أبحرت فيكِ`,

`وأنتِ يا ايلاف

لو أحبكِ مليون فأنا منهم
وإذا أحبكِ واحد فهذا أنا
وإذا لم يُحبك أحد فاعلمي حينها أني مت`,

`أُحبكِ اليوم وغدًا وبعد غد
أُحبكِ كامل الأيام
أُحبكِ عندما نتخاصم وعند الأحضان

إلى آخر نبضة في قلبي
وإلى آخر نفس في صدري
ستبقين الحكاية الأجمل ♡`
];

let i = 0;
const card = document.getElementById("card");

function showPage() {
    card.innerHTML = `
        <div style="white-space:pre-line">${pages[i]}</div>
        <button onclick="nextPage()">▶ next</button>
    `;
}

function nextPage() {
    card.classList.add("hidden");

    setTimeout(() => {
        i++;
        if(i >= pages.length) i = pages.length - 1;
        showPage();
        card.classList.remove("hidden");
    }, 600);
}

showPage();

</script>

</body>
</html>
